name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Use npm ci for reproducible installs
      - name: Install dependencies
        run: npm ci

  test:
    runs-on: ubuntu-latest

    # Ensure install job finishes first
    needs: install

    steps:
      # Every job gets a fresh machine, so checkout again
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies on this machine
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test