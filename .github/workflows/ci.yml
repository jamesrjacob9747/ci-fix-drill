name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      # Fix: Checkout repo so code is available
      - uses: actions/checkout@v4

      # Fix: Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Fix: Use npm ci for reproducible installs
      - name: Install dependencies
        run: npm ci

  test:
    runs-on: ubuntu-latest

    # Fix: Ensure test runs AFTER install job
    needs: install

    steps:
      # Fix: Checkout again (each job is isolated)
      - uses: actions/checkout@v4

      # Fix: Setup Node again
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Fix: Install dependencies again in this job
      - name: Install dependencies
        run: npm ci

      # Run tests
      - name: Run tests
        run: npm test